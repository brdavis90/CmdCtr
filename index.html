<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0A0F1E;
  --surface:#111827;
  --surface2:#1a2236;
  --border:#1f2d45;
  --border2:#2a3f5f;
  --text:#F0F4FF;
  --text2:#9BAFCC;
  --text3:#5a7295;
  --accent:#4B8BF5;
  --accent-dim:#0d1e3a;
  --green:#34D399;
  --green-dim:#0d3325;
  --red:#F87171;
  --red-dim:#3a1111;
  --amber:#FBBF24;
  --amber-dim:#3a2a05;
  --purple:#A78BFA;
  --purple-dim:#2a1f4a;
  --pink:#F472B6;
  --pink-dim:#3a1030;
  --radius:6px;
  --header-h:64px;
}
html,body{height:100%;overflow-x:hidden;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;}
#app{display:flex;flex-direction:column;min-height:100vh;}

#header{
  height:var(--header-h);display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;background:var(--surface);border-bottom:2px solid var(--border2);
  position:sticky;top:0;z-index:200;gap:16px;flex-shrink:0;
}
#header-eyebrow{font-size:10px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--text3);}
#header-sub{font-size:17px;font-weight:600;color:var(--text);letter-spacing:-0.01em;}
#header-nav{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}

.nav-btn{
  background:transparent;border:1px solid transparent;color:var(--text3);
  font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;
  padding:7px 14px;border-radius:var(--radius);transition:all 0.15s;
}
.nav-btn:hover{color:var(--text);background:var(--surface2);}
.nav-btn.on{color:var(--accent);background:var(--accent-dim);border-color:var(--border2);}
.hdr-btn{
  background:var(--surface2);border:1px solid var(--border2);color:var(--text2);
  font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;
  padding:7px 14px;border-radius:var(--radius);transition:all 0.15s;white-space:nowrap;
}
.hdr-btn:hover{background:var(--border);color:var(--text);}
.hdr-sep{width:1px;height:24px;background:var(--border2);margin:0 4px;}

#main{flex:1;padding:28px;width:100%;}

.btn{
  display:inline-flex;align-items:center;gap:6px;font-family:'Inter',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;padding:9px 18px;
  border-radius:var(--radius);border:1.5px solid transparent;transition:all 0.15s;white-space:nowrap;
}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:#3a7ae0;}
.btn-ghost{background:var(--surface2);color:var(--text2);border-color:var(--border2);}
.btn-ghost:hover{color:var(--text);background:var(--border);}
.btn-danger{background:var(--red-dim);color:var(--red);border-color:#f8717140;}
.btn-danger:hover{background:#4a1414;}
.btn-purple{background:var(--purple-dim);color:var(--purple);border-color:#a78bfa40;}
.btn-purple:hover{background:#3a2a5f;}
.btn-amber{background:var(--amber-dim);color:var(--amber);border-color:#fbbf2440;}
.btn-amber:hover{background:#4a3510;}
.btn-sm{font-size:12px;padding:6px 12px;}
.btn-xs{font-size:11px;padding:4px 10px;}

.inp{
  width:100%;background:var(--surface2);border:1.5px solid var(--border2);
  border-radius:var(--radius);color:var(--text);font-family:'Inter',sans-serif;
  font-size:14px;padding:10px 14px;outline:none;transition:border-color 0.15s;
}
.inp:focus{border-color:var(--accent);}
.inp::placeholder{color:var(--text3);}
select.inp option{background:var(--surface2);color:var(--text);}
textarea.inp{resize:vertical;line-height:1.6;}
.lbl{display:block;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}

.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);}

.stat-tile{
  background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);
  padding:20px 24px;cursor:pointer;transition:all 0.15s;
}
.stat-tile:hover{border-color:var(--border2);background:var(--surface2);}
.stat-num{font-size:40px;font-weight:700;line-height:1;margin:8px 0 6px;letter-spacing:-0.03em;}
.stat-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);}
.stat-hint{font-size:11px;color:var(--text3);margin-top:6px;}

.badge{
  display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;
  letter-spacing:0.04em;padding:3px 9px;border-radius:4px;white-space:nowrap;
}

.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;}
.day-col{
  background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);
  display:flex;flex-direction:column;min-height:220px;overflow:hidden;
}
.day-col.today{border-color:var(--accent);background:var(--accent-dim);}
.day-col.past{opacity:0.5;}
.day-col.weekend{opacity:0.7;}
.day-hdr{padding:12px 12px 10px;border-bottom:1px solid var(--border);}
.day-name{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);}
.day-num{font-size:28px;font-weight:700;line-height:1.1;margin:3px 0;color:var(--text);}
.day-col.today .day-name,.day-col.today .day-num{color:var(--accent);}
.day-bar{width:22px;height:3px;background:var(--accent);border-radius:2px;margin-top:4px;}
.day-body{flex:1;padding:6px 0;overflow-y:auto;}
.cal-item{
  padding:8px 10px;margin:0 6px 5px;border-radius:4px;cursor:pointer;
  border-left:3px solid transparent;transition:opacity 0.15s;background:var(--surface2);
}
.cal-item:hover{opacity:0.8;}
.cal-item-type{font-size:10px;font-weight:600;letter-spacing:0.05em;margin-bottom:2px;}
.cal-item-title{font-size:12px;font-weight:500;color:var(--text);line-height:1.3;}
.cal-item-meta{font-size:11px;margin-top:3px;}
.cal-empty{font-size:12px;color:var(--text3);padding:14px 12px;}

.list-row{
  display:flex;align-items:center;gap:16px;padding:18px 22px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s;
}
.list-row:hover{background:var(--surface2);}
.list-row:last-child{border-bottom:none;}
.pri-bar{width:4px;border-radius:3px;align-self:stretch;min-height:48px;flex-shrink:0;}

.board-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.board-col-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:14px;border-bottom:1.5px solid var(--border);}
.board-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.board-col-title{font-size:13px;font-weight:600;color:var(--text2);letter-spacing:0.04em;text-transform:uppercase;}
.board-count{font-size:13px;color:var(--text3);margin-left:auto;font-weight:500;}
.board-card{
  background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);
  padding:16px 18px;cursor:pointer;transition:all 0.15s;border-left:4px solid transparent;margin-bottom:10px;
}
.board-card:hover{border-color:var(--border2);background:var(--border);}
.board-card-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:10px;}

.bubble-u{
  background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--radius);
  padding:14px 18px;margin-left:56px;font-size:14px;line-height:1.6;color:var(--text);
}
.bubble-a{
  background:var(--surface);border:1.5px solid var(--border);border-left:4px solid var(--accent);
  border-radius:var(--radius);padding:14px 18px;margin-right:56px;
  font-size:14px;line-height:1.8;color:var(--text);
}
.bubble-label{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}

#toast{
  position:fixed;bottom:28px;right:28px;z-index:999;border-radius:var(--radius);
  padding:12px 20px;font-size:13px;font-weight:500;pointer-events:none;display:none;border:1.5px solid;
}

#api-modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;}
#api-modal.open{display:flex;}
#api-box{background:var(--surface);border:1.5px solid var(--border2);border-radius:10px;padding:32px 36px;max-width:480px;width:90%;}
#api-box h2{font-size:20px;font-weight:600;color:var(--text);margin-bottom:10px;}
#api-box p{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:20px;}
#api-box a{color:var(--accent);}

.filter-bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:22px;align-items:center;}
.filter-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-right:4px;}
.f-btn{
  background:var(--surface2);border:1.5px solid var(--border);color:var(--text3);
  font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;
  padding:7px 15px;border-radius:var(--radius);transition:all 0.15s;
}
.f-btn:hover{color:var(--text);border-color:var(--border2);}
.f-btn.on{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
</style>
</head>
<body>
<div id="app">
  <div id="toast"></div>

  <div id="api-modal">
    <div id="api-box">
      <h2>Anthropic API Key</h2>
      <p>The AI agent calls Claude directly from your browser. Your key is stored only in your browser's localStorage and sent only to Anthropic's API.<br><br>Get a free key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></p>
      <label class="lbl">API Key</label>
      <input id="api-key-input" class="inp" type="password" placeholder="sk-ant-..." style="margin-bottom:16px;">
      <div style="display:flex;gap:10px;">
        <button class="btn btn-primary" onclick="saveApiKey()">Save Key</button>
        <button class="btn btn-ghost" onclick="closeApiModal()">Cancel</button>
        <button class="btn btn-danger btn-sm" onclick="clearApiKey()" style="margin-left:auto;">Clear Key</button>
      </div>
    </div>
  </div>

  <div id="header">
    <div>
      <div id="header-eyebrow">Work Command Center</div>
      <div id="header-sub"></div>
    </div>
    <div id="header-nav">
      <button class="nav-btn" data-view="week">Week</button>
      <button class="nav-btn" data-view="board">Board</button>
      <button class="nav-btn" data-view="list">List</button>
      <button class="nav-btn" data-view="add">+ New</button>
      <button class="nav-btn" data-view="agent">⚡ Agent</button>
      <div class="hdr-sep"></div>
      <button id="theme-btn" class="hdr-btn">☾ Dark</button>
      <button class="hdr-btn" onclick="document.getElementById('api-modal').classList.add('open')">🔑 API Key</button>
    </div>
  </div>

  <div id="main"></div>
</div>
<script>
const SKEY='wcc-items-v4',NKEY='wcc-notes-v4',PKEY='wcc-pads-v4',TKEY='wcc-theme-v4',AKEY='wcc-apikey-v1';
const CATS={project:{label:'Project',icon:'▣',color:'#4B8BF5'},deliverable:{label:'Deliverable',icon:'◆',color:'#FBBF24'},followup:{label:'Follow-up',icon:'↺',color:'#A78BFA'},ticket:{label:'Ticket',icon:'⬡',color:'#34D399'},meeting:{label:'Meeting',icon:'◈',color:'#F472B6'}};
const STAT={notstarted:{label:'Not Started',color:'#5a7295'},inprogress:{label:'In Progress',color:'#4B8BF5'},blocked:{label:'Blocked',color:'#F87171'},waitingon:{label:'Waiting On',color:'#FBBF24'},done:{label:'Done',color:'#34D399'}};
const PRI={critical:{label:'P0 Critical',color:'#F87171'},high:{label:'P1 High',color:'#FBBF24'},medium:{label:'P2 Medium',color:'#4B8BF5'},low:{label:'P3 Low',color:'#5a7295'}};
const THEMES={
  dark:{'--bg':'#0A0F1E','--surface':'#111827','--surface2':'#1a2236','--border':'#1f2d45','--border2':'#2a3f5f','--text':'#F0F4FF','--text2':'#9BAFCC','--text3':'#5a7295','--accent':'#4B8BF5','--accent-dim':'#0d1e3a','--green':'#34D399','--green-dim':'#0d3325','--red':'#F87171','--red-dim':'#3a1111','--amber':'#FBBF24','--amber-dim':'#3a2a05','--purple':'#A78BFA','--purple-dim':'#2a1f4a','--pink':'#F472B6','--pink-dim':'#3a1030',label:'☾ Dark'},
  dim:{'--bg':'#181818','--surface':'#212121','--surface2':'#2a2a2a','--border':'#363636','--border2':'#484848','--text':'#F2F2F2','--text2':'#ADADAD','--text3':'#6a6a6a','--accent':'#5B8AF5','--accent-dim':'#1a2240','--green':'#34D399','--green-dim':'#0d2a1e','--red':'#F87171','--red-dim':'#2a0f0f','--amber':'#FBBF24','--amber-dim':'#2a2005','--purple':'#A78BFA','--purple-dim':'#1e1535','--pink':'#F472B6','--pink-dim':'#280a20',label:'◑ Dim'},
  light:{'--bg':'#EEF1F8','--surface':'#FFFFFF','--surface2':'#F3F5FA','--border':'#D8DDE8','--border2':'#BFC8D8','--text':'#0D1829','--text2':'#334155','--text3':'#64748B','--accent':'#2563EB','--accent-dim':'#EFF6FF','--green':'#059669','--green-dim':'#ECFDF5','--red':'#DC2626','--red-dim':'#FEF2F2','--amber':'#D97706','--amber-dim':'#FFFBEB','--purple':'#7C3AED','--purple-dim':'#F5F3FF','--pink':'#DB2777','--pink-dim':'#FDF2F8',label:'☀ Light'}
};
const SAMPLE=[{id:1,title:'Push prod updates',category:'deliverable',priority:'critical',status:'inprogress',due:'2026-05-02',time:'19:00',waitingOn:'',notes:'Maintenance window 19:00-23:00',done:false},{id:2,title:'Complete Relato questionnaire',category:'deliverable',priority:'high',status:'notstarted',due:'2026-05-05',time:'',waitingOn:'',notes:'Due this week',done:false},{id:3,title:'Ask GDIT HR about HSA eligibility',category:'followup',priority:'medium',status:'notstarted',due:'2026-05-07',time:'',waitingOn:'GDIT HR',notes:'Can I contribute to HSA with current health plan?',done:false},{id:4,title:'Q1 milestone review',category:'meeting',priority:'medium',status:'notstarted',due:'2026-05-06',time:'10:00',waitingOn:'',notes:'Prep slides beforehand',done:false},{id:5,title:'Follow up with Fidelity',category:'followup',priority:'medium',status:'waitingon',due:'2026-05-07',time:'',waitingOn:'Fidelity',notes:'IRA to Roth conversion next steps',done:false},{id:6,title:'Sprint planning',category:'meeting',priority:'high',status:'notstarted',due:'2026-05-05',time:'09:00',waitingOn:'',notes:'Q2 kickoff sprint',done:false},{id:7,title:'1:1 with manager',category:'meeting',priority:'medium',status:'notstarted',due:'2026-05-06',time:'14:00',waitingOn:'',notes:'',done:false}];

let S={items:[],view:'week',sel:null,fCat:'all',fStat:'active',wkOff:0,form:{title:'',category:'meeting',priority:'medium',status:'notstarted',due:'',time:'',waitingOn:'',notes:''},msgs:[],loading:false,notes:'',pads:{followups:'',blockers:'',ideas:''},theme:'dark'};

function ls(k,v){if(v===undefined){try{return localStorage.getItem(k);}catch(e){return null;}}try{localStorage.setItem(k,String(v));}catch(e){}}
function load(){
  try{const d=ls(SKEY);S.items=d?JSON.parse(d):SAMPLE.map(i=>({...i}));}catch(e){S.items=SAMPLE.map(i=>({...i}));}
  try{const d=ls(NKEY);if(d)S.notes=d;}catch(e){}
  try{const d=ls(PKEY);if(d)S.pads=JSON.parse(d);}catch(e){}
  try{const d=ls(TKEY);if(d&&THEMES[d])S.theme=d;}catch(e){}
}
const save=()=>ls(SKEY,JSON.stringify(S.items));
const saveN=()=>ls(NKEY,S.notes);
const saveP=()=>ls(PKEY,JSON.stringify(S.pads));
const saveT=()=>ls(TKEY,S.theme);
const getApiKey=()=>ls(AKEY)||'';

window.saveApiKey=()=>{const k=document.getElementById('api-key-input')?.value?.trim();if(k){ls(AKEY,k);closeApiModal();toast('API key saved');}};
window.clearApiKey=()=>{ls(AKEY,'');document.getElementById('api-key-input').value='';toast('Key cleared','info');};
window.closeApiModal=()=>document.getElementById('api-modal').classList.remove('open');

function applyTheme(){
  const T=THEMES[S.theme];
  Object.keys(T).forEach(k=>{if(k!=='label')document.documentElement.style.setProperty(k,T[k]);});
  const tb=document.getElementById('theme-btn');if(tb)tb.textContent=T.label;
}

function toDS(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function daysUntil(ds){const t=new Date();t.setHours(0,0,0,0);const x=new Date(ds+'T00:00:00');x.setHours(0,0,0,0);return Math.round((x-t)/86400000);}
function shortDate(ds){return new Date(ds+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function dueLabel(ds){const n=daysUntil(ds);if(n<0)return`${Math.abs(n)}d overdue`;if(n===0)return'Today';if(n===1)return'Tomorrow';if(n<=7)return`In ${n}d`;return shortDate(ds);}
function dueColor(ds){const n=daysUntil(ds);return n<0?'var(--red)':n<=2?'var(--amber)':'var(--text3)';}
function wkStart(d){const x=new Date(d),day=x.getDay(),diff=day===0?-6:1-day;x.setDate(x.getDate()+diff);x.setHours(0,0,0,0);return x;}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
const active=()=>S.items.filter(i=>!i.done);
const filtered=()=>active()
  .filter(i=>S.fCat==='all'||i.category===S.fCat)
  .filter(i=>{if(S.fStat==='active')return i.status!=='done';if(S.fStat==='blocked')return i.status==='blocked'||i.status==='waitingon';if(S.fStat==='overdue')return daysUntil(i.due)<0;return true;})
  .sort((a,b)=>{const po=['critical','high','medium','low'],pd=po.indexOf(a.priority)-po.indexOf(b.priority);return pd||new Date(a.due)-new Date(b.due);});

let _t=null;
function toast(msg,type='ok'){
  const el=document.getElementById('toast');if(!el)return;
  el.textContent=msg;el.style.display='block';
  el.style.background=type==='err'?'var(--red-dim)':'var(--green-dim)';
  el.style.borderColor=type==='err'?'var(--red)':'var(--green)';
  el.style.color=type==='err'?'var(--red)':'var(--green)';
  if(_t)clearTimeout(_t);_t=setTimeout(()=>el.style.display='none',2500);
}

window.updateStatus=(id,status)=>{S.items=S.items.map(i=>i.id===id?{...i,status,done:status==='done'}:i);save();toast('Updated');render();};
window.deleteItem=(id)=>{S.items=S.items.filter(i=>i.id!==id);save();S.view='week';toast('Removed','info');render();};
window.quickAsk=(q)=>{S.view='agent';render();setTimeout(()=>doSend(q),80);};
window.collectAndAdd=()=>{
  const f={title:gv('f-title'),category:gv('f-cat'),priority:gv('f-pri'),status:gv('f-stat2'),due:gv('f-due'),time:gv('f-time'),waitingOn:gv('f-wait'),notes:gv('f-notes')};
  if(!f.title||!f.due){toast('Title and due date required','err');return;}
  S.items=[...S.items,{...f,id:Date.now(),done:false}];save();
  S.form={title:'',category:'meeting',priority:'medium',status:'notstarted',due:'',time:'',waitingOn:'',notes:''};
  S.view='week';toast('Item added');render();
};
function gv(id){return document.getElementById(id)?.value||'';}

async function doSend(msg){
  const key=getApiKey();
  if(!key){document.getElementById('api-modal').classList.add('open');toast('API key required','err');return;}
  S.msgs=[...S.msgs,{role:'user',content:msg}];S.loading=true;render();
  const ctx=active().map(i=>`[${CATS[i.category]?.label}] "${i.title}" | ${PRI[i.priority]?.label} | ${STAT[i.status]?.label} | Due:${i.due}${i.time?' @'+i.time:''}${i.waitingOn?' | Waiting:'+i.waitingOn:''}${i.notes?' | '+i.notes.substring(0,80):''}`).join('\n')||'No items.';
  const sys=`You are a sharp work operations assistant. Be direct, specific, no fluff.\nWork items:\n${ctx}\nToday:${toDS(new Date())}\nGive numbered lists for priorities. Draft full emails when asked. Flag overdue items plainly. Think like a chief of staff.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1024,system:sys,messages:S.msgs.map(m=>({role:m.role,content:m.content}))})});
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    S.msgs=[...S.msgs,{role:'assistant',content:data.content?.map(b=>b.text||'').join('')||'No response.'}];
  }catch(e){S.msgs=[...S.msgs,{role:'assistant',content:`Error: ${e.message}`}];}
  S.loading=false;render();

  const inp=document.getElementById('agent-inp');
  document.getElementById('agent-send')?.addEventListener('click',()=>{if(inp?.value?.trim())doSend(inp.value.trim());});
  inp?.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(inp.value.trim())doSend(inp.value.trim());}});
  if(inp&&!S.loading)inp.focus();
}

function render(){
  applyTheme();renderHeader();
  ({week:renderWeek,board:renderBoard,list:renderList,add:renderAdd,detail:renderDetail,agent:renderAgent}[S.view]||renderWeek)();
}

document.addEventListener('click',e=>{
  const nb=e.target.closest('.nav-btn[data-view]');
  if(nb){S.view=nb.dataset.view;render();}
});
document.getElementById('theme-btn').addEventListener('click',()=>{
  const keys=Object.keys(THEMES);S.theme=keys[(keys.indexOf(S.theme)+1)%keys.length];saveT();render();
});
document.getElementById('api-modal').addEventListener('click',e=>{if(e.target.id==='api-modal')closeApiModal();});
load();render();
</script>
</body>
</html>
