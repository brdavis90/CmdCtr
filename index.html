<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Command Center</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;overflow-x:hidden;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:#0A0F1E;
  color:#F0F4FF;
  font-size:15px;
  line-height:1.5;
}
#app{display:flex;flex-direction:column;min-height:100vh;width:100%;}
 
/* HEADER */
#header{
  width:100%;
  height:64px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 28px;
  background:#111827;
  border-bottom:2px solid #2a3f5f;
  position:sticky;
  top:0;
  z-index:200;
  gap:16px;
  flex-shrink:0;
}
#header-eyebrow{font-size:10px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:#5a7295;margin-bottom:2px;}
#header-sub{font-size:17px;font-weight:600;color:#F0F4FF;letter-spacing:-0.01em;}
#header-nav{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
 
.nav-btn{
  background:transparent;
  border:1px solid transparent;
  color:#5a7295;
  font-family:inherit;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  padding:7px 14px;
  border-radius:6px;
  transition:all 0.15s;
}
.nav-btn:hover{color:#F0F4FF;background:#1a2236;}
.nav-btn.on{color:#4B8BF5;background:#0d1e3a;border-color:#2a3f5f;}
 
.hdr-btn{
  background:#1a2236;
  border:1px solid #2a3f5f;
  color:#9BAFCC;
  font-family:inherit;
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  padding:7px 14px;
  border-radius:6px;
  transition:all 0.15s;
  white-space:nowrap;
}
.hdr-btn:hover{background:#1f2d45;color:#F0F4FF;}
.hdr-sep{width:1px;height:24px;background:#2a3f5f;margin:0 4px;flex-shrink:0;}
 
/* MAIN */
#main{flex:1;padding:28px;width:100%;}
 
/* BUTTONS */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  font-family:inherit;font-size:13px;font-weight:500;
  cursor:pointer;padding:9px 18px;border-radius:6px;
  border:1.5px solid transparent;transition:all 0.15s;white-space:nowrap;
}
.btn-primary{background:#4B8BF5;color:#fff;border-color:#4B8BF5;}
.btn-primary:hover{background:#3a7ae0;}
.btn-ghost{background:#1a2236;color:#9BAFCC;border-color:#2a3f5f;}
.btn-ghost:hover{color:#F0F4FF;background:#1f2d45;}
.btn-danger{background:#3a1111;color:#F87171;border-color:#f8717140;}
.btn-danger:hover{background:#4a1414;}
.btn-purple{background:#2a1f4a;color:#A78BFA;border-color:#a78bfa40;}
.btn-purple:hover{background:#3a2a5f;}
.btn-amber{background:#3a2a05;color:#FBBF24;border-color:#fbbf2440;}
.btn-amber:hover{background:#4a3510;}
.btn-sm{font-size:12px;padding:6px 12px;}
.btn-xs{font-size:11px;padding:4px 10px;}
 
/* INPUTS */
.inp{
  width:100%;
  background:#1a2236;
  border:1.5px solid #2a3f5f;
  border-radius:6px;
  color:#F0F4FF;
  font-family:inherit;
  font-size:14px;
  padding:10px 14px;
  outline:none;
  transition:border-color 0.15s;
}
.inp:focus{border-color:#4B8BF5;}
.inp::placeholder{color:#5a7295;}
select.inp option{background:#1a2236;color:#F0F4FF;}
textarea.inp{resize:vertical;line-height:1.6;}
.lbl{display:block;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#5a7295;margin-bottom:6px;}
 
/* STAT TILES */
.stat-tile{
  background:#111827;
  border:1.5px solid #1f2d45;
  border-radius:6px;
  padding:20px 24px;
  cursor:pointer;
  transition:all 0.15s;
}
.stat-tile:hover{border-color:#2a3f5f;background:#1a2236;}
.stat-num{font-size:40px;font-weight:700;line-height:1;margin:8px 0 6px;letter-spacing:-0.03em;}
.stat-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#5a7295;}
.stat-hint{font-size:11px;color:#5a7295;margin-top:6px;}
 
/* BADGES */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:600;letter-spacing:0.04em;
  padding:3px 9px;border-radius:4px;white-space:nowrap;
}
 
/* WEEK CALENDAR */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;}
.day-col{
  background:#111827;
  border:1.5px solid #1f2d45;
  border-radius:6px;
  display:flex;
  flex-direction:column;
  min-height:220px;
  overflow:hidden;
}
.day-col.today{border-color:#4B8BF5;background:#0d1e3a;}
.day-col.past{opacity:0.5;}
.day-col.weekend{opacity:0.7;}
.day-hdr{padding:12px 12px 10px;border-bottom:1px solid #1f2d45;}
.day-name{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#5a7295;}
.day-num{font-size:28px;font-weight:700;line-height:1.1;margin:3px 0;color:#F0F4FF;}
.day-col.today .day-name,.day-col.today .day-num{color:#4B8BF5;}
.day-bar{width:22px;height:3px;background:#4B8BF5;border-radius:2px;margin-top:4px;}
.day-body{flex:1;padding:6px 0;overflow-y:auto;}
.cal-item{
  padding:8px 10px;margin:0 6px 5px;border-radius:4px;cursor:pointer;
  border-left:3px solid transparent;transition:opacity 0.15s;background:#1a2236;
}
.cal-item:hover{opacity:0.8;}
.cal-item-type{font-size:10px;font-weight:600;letter-spacing:0.05em;margin-bottom:2px;}
.cal-item-title{font-size:12px;font-weight:500;color:#F0F4FF;line-height:1.3;}
.cal-item-meta{font-size:11px;margin-top:3px;}
.cal-empty{font-size:12px;color:#5a7295;padding:14px 12px;}
 
/* LIST */
.list-row{
  display:flex;align-items:center;gap:16px;padding:18px 22px;
  border-bottom:1px solid #1f2d45;cursor:pointer;transition:background 0.12s;
}
.list-row:hover{background:#1a2236;}
.list-row:last-child{border-bottom:none;}
.pri-bar{width:4px;border-radius:3px;align-self:stretch;min-height:48px;flex-shrink:0;}
 
/* BOARD */
.board-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.board-col-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:14px;border-bottom:1.5px solid #1f2d45;}
.board-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.board-col-title{font-size:13px;font-weight:600;color:#9BAFCC;letter-spacing:0.04em;text-transform:uppercase;}
.board-count{font-size:13px;color:#5a7295;margin-left:auto;font-weight:500;}
.board-card{
  background:#1a2236;border:1.5px solid #1f2d45;border-radius:6px;
  padding:16px 18px;cursor:pointer;transition:all 0.15s;border-left:4px solid transparent;margin-bottom:10px;
}
.board-card:hover{border-top-color:#2a3f5f;border-right-color:#2a3f5f;border-bottom-color:#2a3f5f;background:#1f2d45;}
.board-card-title{font-size:14px;font-weight:500;color:#F0F4FF;line-height:1.4;margin-bottom:10px;}
 
/* AGENT */
.bubble-u{
  background:#1a2236;border:1.5px solid #2a3f5f;border-radius:6px;
  padding:14px 18px;margin-left:56px;font-size:14px;line-height:1.6;color:#F0F4FF;
}
.bubble-a{
  background:#111827;border:1.5px solid #1f2d45;border-left:4px solid #4B8BF5;
  border-radius:6px;padding:14px 18px;margin-right:56px;
  font-size:14px;line-height:1.8;color:#F0F4FF;
}
.bubble-label{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#5a7295;margin-bottom:8px;}
 
/* TOAST */
#toast{
  position:fixed;bottom:28px;right:28px;z-index:999;border-radius:6px;
  padding:12px 20px;font-size:13px;font-weight:500;pointer-events:none;display:none;border:1.5px solid;
}
 
/* API MODAL */
#api-modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;}
#api-modal.open{display:flex;}
#api-box{
  background:#111827;border:1.5px solid #2a3f5f;border-radius:10px;
  padding:32px 36px;max-width:480px;width:90%;
}
#api-box h2{font-size:20px;font-weight:600;color:#F0F4FF;margin-bottom:10px;}
#api-box p{font-size:13px;color:#9BAFCC;line-height:1.7;margin-bottom:20px;}
#api-box a{color:#4B8BF5;}
 
/* FILTERS */
.filter-bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:22px;align-items:center;}
.filter-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#5a7295;margin-right:4px;}
.f-btn{
  background:#1a2236;border:1.5px solid #1f2d45;color:#5a7295;
  font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;
  padding:7px 15px;border-radius:6px;transition:all 0.15s;
}
.f-btn:hover{color:#F0F4FF;border-color:#2a3f5f;}
.f-btn.on{background:#0d1e3a;color:#4B8BF5;border-color:#4B8BF5;}
 
/* CARD BASE */
.card{background:#111827;border:1.5px solid #1f2d45;border-radius:6px;}
 
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#2a3f5f;border-radius:4px;}
</style>
</head>
<body>
<div id="app">
  <div id="toast"></div>
 
  <!-- API MODAL -->
  <div id="api-modal">
    <div id="api-box">
      <h2>Anthropic API Key</h2>
      <p>The AI agent calls Claude directly from your browser. Your key is stored only in your browser's localStorage and sent only to Anthropic's API.<br><br>Get a free key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></p>
      <label class="lbl">API Key</label>
      <input id="api-key-input" class="inp" type="password" placeholder="sk-ant-..." style="margin-bottom:16px;">
      <div style="display:flex;gap:10px;">
        <button class="btn btn-primary" onclick="saveApiKey()">Save Key</button>
        <button class="btn btn-ghost" onclick="closeApiModal()">Cancel</button>
        <button class="btn btn-danger btn-sm" onclick="clearApiKey()" style="margin-left:auto;">Clear Key</button>
      </div>
    </div>
  </div>
 
  <!-- HEADER -->
  <div id="header">
    <div>
      <div id="header-eyebrow">Work Command Center</div>
      <div id="header-sub"></div>
    </div>
    <div id="header-nav">
      <button class="nav-btn" data-view="week">Week</button>
      <button class="nav-btn" data-view="board">Board</button>
      <button class="nav-btn" data-view="list">List</button>
      <button class="nav-btn" data-view="add">+ New</button>
      <button class="nav-btn" data-view="agent">⚡ Agent</button>
      <div class="hdr-sep"></div>
      <button id="theme-btn" class="hdr-btn" onclick="cycleTheme()">☾ Dark</button>
      <button class="hdr-btn" onclick="document.getElementById('api-modal').classList.add('open')">🔑 API Key</button>
    </div>
  </div>
 
  <div id="main"></div>
</div>
 
<script>
// ── CONSTANTS ──────────────────────────────────────────────
const SKEY='wcc-items-v5',NKEY='wcc-notes-v5',PKEY='wcc-pads-v5',TKEY='wcc-theme-v5',AKEY='wcc-apikey-v1';
 
const CATS={
  project:    {label:'Project',    icon:'▣', color:'#4B8BF5', bg:'rgba(75,139,245,0.12)'},
  deliverable:{label:'Deliverable',icon:'◆', color:'#FBBF24', bg:'rgba(251,191,36,0.12)'},
  followup:   {label:'Follow-up',  icon:'↺', color:'#A78BFA', bg:'rgba(167,139,250,0.12)'},
  ticket:     {label:'Ticket',     icon:'⬡', color:'#34D399', bg:'rgba(52,211,153,0.12)'},
  meeting:    {label:'Meeting',    icon:'◈', color:'#F472B6', bg:'rgba(244,114,182,0.12)'}
};
const STAT={
  notstarted:{label:'Not Started', color:'#5a7295', bg:'rgba(90,114,149,0.15)'},
  inprogress:{label:'In Progress', color:'#4B8BF5', bg:'rgba(75,139,245,0.15)'},
  blocked:   {label:'Blocked',     color:'#F87171', bg:'rgba(248,113,113,0.15)'},
  waitingon: {label:'Waiting On',  color:'#FBBF24', bg:'rgba(251,191,36,0.15)'},
  done:      {label:'Done',        color:'#34D399', bg:'rgba(52,211,153,0.15)'}
};
const PRI={
  critical:{label:'P0 Critical', color:'#F87171', bg:'rgba(248,113,113,0.15)'},
  high:    {label:'P1 High',     color:'#FBBF24', bg:'rgba(251,191,36,0.15)'},
  medium:  {label:'P2 Medium',   color:'#4B8BF5', bg:'rgba(75,139,245,0.15)'},
  low:     {label:'P3 Low',      color:'#5a7295', bg:'rgba(90,114,149,0.15)'}
};
 
// ── THEMES ────────────────────────────────────────────────
const THEMES={
  dark:{
    body:'#0A0F1E', header:'#111827', surface:'#111827', surface2:'#1a2236',
    border:'#1f2d45', border2:'#2a3f5f', text:'#F0F4FF', text2:'#9BAFCC',
    text3:'#5a7295', accent:'#4B8BF5', accentDim:'#0d1e3a',
    calItem:'#1a2236', todayBg:'#0d1e3a', todayBorder:'#4B8BF5',
    rowHover:'#1a2236', cardBg:'#111827', inputBg:'#1a2236',
    fBtnBg:'#1a2236', fBtnBgOn:'#0d1e3a', scrollThumb:'#2a3f5f',
    label:'☾ Dark'
  },
  dim:{
    body:'#181818', header:'#212121', surface:'#212121', surface2:'#2a2a2a',
    border:'#363636', border2:'#484848', text:'#F2F2F2', text2:'#ADADAD',
    text3:'#6a6a6a', accent:'#5B8AF5', accentDim:'#1a2240',
    calItem:'#2a2a2a', todayBg:'#1a2240', todayBorder:'#5B8AF5',
    rowHover:'#2a2a2a', cardBg:'#212121', inputBg:'#2a2a2a',
    fBtnBg:'#2a2a2a', fBtnBgOn:'#1a2240', scrollThumb:'#484848',
    label:'◑ Dim'
  },
  light:{
    body:'#EEF1F8', header:'#FFFFFF', surface:'#FFFFFF', surface2:'#F3F5FA',
    border:'#D8DDE8', border2:'#BFC8D8', text:'#0D1829', text2:'#334155',
    text3:'#64748B', accent:'#2563EB', accentDim:'#EFF6FF',
    calItem:'#F3F5FA', todayBg:'#EFF6FF', todayBorder:'#2563EB',
    rowHover:'#F3F5FA', cardBg:'#FFFFFF', inputBg:'#FFFFFF',
    fBtnBg:'#F3F5FA', fBtnBgOn:'#EFF6FF', scrollThumb:'#BFC8D8',
    label:'☀ Light'
  }
};
 
// ── SAMPLE DATA ───────────────────────────────────────────
const SAMPLE=[
  {id:1,title:'Push prod updates',category:'deliverable',priority:'critical',status:'inprogress',due:'2026-05-02',time:'19:00',waitingOn:'',notes:'Maintenance window 19:00-23:00',done:false},
  {id:2,title:'Complete Relato questionnaire',category:'deliverable',priority:'high',status:'notstarted',due:'2026-05-05',time:'',waitingOn:'',notes:'Due this week',done:false},
  {id:3,title:'Ask GDIT HR about HSA eligibility',category:'followup',priority:'medium',status:'notstarted',due:'2026-05-07',time:'',waitingOn:'GDIT HR',notes:'Can I contribute to HSA with current health plan?',done:false},
  {id:4,title:'Q1 milestone review',category:'meeting',priority:'medium',status:'notstarted',due:'2026-05-06',time:'10:00',waitingOn:'',notes:'Prep slides beforehand',done:false},
  {id:5,title:'Follow up with Fidelity',category:'followup',priority:'medium',status:'waitingon',due:'2026-05-07',time:'',waitingOn:'Fidelity',notes:'IRA to Roth conversion next steps',done:false},
  {id:6,title:'Sprint planning',category:'meeting',priority:'high',status:'notstarted',due:'2026-05-05',time:'09:00',waitingOn:'',notes:'Q2 kickoff sprint',done:false},
  {id:7,title:'1:1 with manager',category:'meeting',priority:'medium',status:'notstarted',due:'2026-05-06',time:'14:00',waitingOn:'',notes:'',done:false}
];
 
// ── STATE ─────────────────────────────────────────────────
let S={
  items:[], view:'week', sel:null,
  fCat:'all', fStat:'active', wkOff:0,
  form:{title:'',category:'meeting',priority:'medium',status:'notstarted',due:'',time:'',waitingOn:'',notes:''},
  msgs:[], loading:false, notes:'',
  pads:{followups:'',blockers:'',ideas:''},
  theme:'dark'
};
let T=THEMES.dark; // current theme object
 
// ── STORAGE ───────────────────────────────────────────────
function ls(k,v){if(v===undefined){try{return localStorage.getItem(k);}catch(e){return null;}}try{localStorage.setItem(k,String(v));}catch(e){}}
function load(){
  try{const d=ls(SKEY);S.items=d?JSON.parse(d):SAMPLE.map(i=>({...i}));}catch(e){S.items=SAMPLE.map(i=>({...i}));}
  try{const d=ls(NKEY);if(d)S.notes=d;}catch(e){}
  try{const d=ls(PKEY);if(d)S.pads=JSON.parse(d);}catch(e){}
  try{const d=ls(TKEY);if(d&&THEMES[d])S.theme=d;}catch(e){}
}
const save=()=>ls(SKEY,JSON.stringify(S.items));
const saveN=()=>ls(NKEY,S.notes);
const saveP=()=>ls(PKEY,JSON.stringify(S.pads));
const getApiKey=()=>ls(AKEY)||'';
 
window.saveApiKey=()=>{const k=document.getElementById('api-key-input')?.value?.trim();if(k){ls(AKEY,k);closeApiModal();toast('API key saved');}};
window.clearApiKey=()=>{ls(AKEY,'');document.getElementById('api-key-input').value='';toast('Key cleared','info');};
window.closeApiModal=()=>document.getElementById('api-modal').classList.remove('open');
 
// ── THEME ─────────────────────────────────────────────────
function applyTheme(){
  T=THEMES[S.theme];
  document.body.style.background=T.body;
  document.body.style.color=T.text;
  const hdr=document.getElementById('header');
  if(hdr){hdr.style.background=T.header;hdr.style.borderBottomColor=T.border2;}
  const tb=document.getElementById('theme-btn');
  if(tb)tb.textContent=T.label;
  // Rewrite all dynamic CSS that uses theme vars
  let css=document.getElementById('theme-css');
  if(!css){css=document.createElement('style');css.id='theme-css';document.head.appendChild(css);}
  css.textContent=`
    .nav-btn:hover{background:${T.surface2}!important;color:${T.text}!important;}
    .nav-btn.on{color:${T.accent}!important;background:${T.accentDim}!important;border-color:${T.border2}!important;}
    .hdr-btn{background:${T.surface2}!important;border-color:${T.border2}!important;color:${T.text2}!important;}
    .hdr-btn:hover{background:${T.border}!important;color:${T.text}!important;}
    .stat-tile{background:${T.surface}!important;border-color:${T.border}!important;}
    .stat-tile:hover{background:${T.surface2}!important;border-color:${T.border2}!important;}
    .day-col{background:${T.surface}!important;border-color:${T.border}!important;}
    .day-col.today{background:${T.todayBg}!important;border-color:${T.todayBorder}!important;}
    .day-hdr{border-bottom-color:${T.border}!important;}
    .day-name{color:${T.text3}!important;}
    .day-num{color:${T.text}!important;}
    .day-col.today .day-name,.day-col.today .day-num{color:${T.accent}!important;}
    .day-bar{background:${T.accent}!important;}
    .cal-item{background:${T.calItem}!important;}
    .cal-item-title{color:${T.text}!important;}
    .cal-empty{color:${T.text3}!important;}
    .card{background:${T.cardBg}!important;border-color:${T.border}!important;}
    .list-row{border-bottom-color:${T.border}!important;}
    .list-row:hover{background:${T.rowHover}!important;}
    .board-card{background:${T.surface2}!important;border-color:${T.border}!important;}
    .board-card:hover{background:${T.border}!important;border-top-color:${T.border2}!important;border-right-color:${T.border2}!important;border-bottom-color:${T.border2}!important;}
    .board-card-title{color:${T.text}!important;}
    .board-col-hdr{border-bottom-color:${T.border}!important;}
    .board-col-title{color:${T.text2}!important;}
    .board-count{color:${T.text3}!important;}
    .inp{background:${T.inputBg}!important;border-color:${T.border2}!important;color:${T.text}!important;}
    .inp::placeholder{color:${T.text3}!important;}
    .inp:focus{border-color:${T.accent}!important;}
    select.inp option{background:${T.inputBg}!important;}
    .lbl{color:${T.text3}!important;}
    .f-btn{background:${T.fBtnBg}!important;border-color:${T.border}!important;color:${T.text3}!important;}
    .f-btn:hover{color:${T.text}!important;border-color:${T.border2}!important;}
    .f-btn.on{background:${T.fBtnBgOn}!important;color:${T.accent}!important;border-color:${T.accent}!important;}
    .bubble-u{background:${T.surface2}!important;border-color:${T.border2}!important;color:${T.text}!important;}
    .bubble-a{background:${T.surface}!important;border-color:${T.border}!important;border-left-color:${T.accent}!important;color:${T.text}!important;}
    .bubble-label{color:${T.text3}!important;}
    .btn-ghost{background:${T.surface2}!important;color:${T.text2}!important;border-color:${T.border2}!important;}
    .btn-ghost:hover{color:${T.text}!important;background:${T.border}!important;}
    #api-box{background:${T.surface}!important;border-color:${T.border2}!important;}

// ── HELPERS ───────────────────────────────────────────────
function toDS(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function daysUntil(ds){const t=new Date();t.setHours(0,0,0,0);const x=new Date(ds+'T00:00:00');x.setHours(0,0,0,0);return Math.round((x-t)/86400000);}
function shortDate(ds){return new Date(ds+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function dueLabel(ds){const n=daysUntil(ds);if(n<0)return`${Math.abs(n)}d overdue`;if(n===0)return'Today';if(n===1)return'Tomorrow';if(n<=7)return`In ${n}d`;return shortDate(ds);}
function dueColor(ds){const n=daysUntil(ds);return n<0?'#F87171':n<=2?'#FBBF24':T.text3;}
function wkStart(d){const x=new Date(d),day=x.getDay(),diff=day===0?-6:1-day;x.setDate(x.getDate()+diff);x.setHours(0,0,0,0);return x;}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
const active=()=>S.items.filter(i=>!i.done);
const filtered=()=>active()
  .filter(i=>S.fCat==='all'||i.category===S.fCat)
  .filter(i=>{if(S.fStat==='active')return i.status!=='done';if(S.fStat==='blocked')return i.status==='blocked'||i.status==='waitingon';if(S.fStat==='overdue')return daysUntil(i.due)<0;return true;})
  .sort((a,b)=>{const po=['critical','high','medium','low'],pd=po.indexOf(a.priority)-po.indexOf(b.priority);return pd||new Date(a.due)-new Date(b.due);});
 
let _t=null;
function toast(msg,type='ok'){
  const el=document.getElementById('toast');if(!el)return;
  el.textContent=msg;el.style.display='block';
  el.style.background=type==='err'?'#3a1111':'#0d3325';
  el.style.borderColor=type==='err'?'#F87171':'#34D399';
  el.style.color=type==='err'?'#F87171':'#34D399';
  if(_t)clearTimeout(_t);_t=setTimeout(()=>el.style.display='none',2500);
}

window.updateStatus=(id,status)=>{S.items=S.items.map(i=>i.id===id?{...i,status,done:status==='done'}:i);save();toast('Updated');render();};
window.deleteItem=(id)=>{S.items=S.items.filter(i=>i.id!==id);save();S.view='week';toast('Removed','info');render();};

window.collectAndAdd=()=>{

async function doSend(msg){
  const key=getApiKey();
  if(!key){document.getElementById('api-modal').classList.add('open');toast('API key required','err');return;}
  S.msgs=[...S.msgs,{role:'user',content:msg}];S.loading=true;render();
  const ctx=active().map(i=>`[${CATS[i.category]?.label}] "${i.title}" | ${PRI[i.priority]?.label} | ${STAT[i.status]?.label} | Due:${i.due}${i.time?' @'+i.time:''}${i.waitingOn?' | Waiting:'+i.waitingOn:''}${i.notes?' | '+i.notes.substring(0,80):''}`).join('\n')||'No items.';
  const sys=`You are a sharp work operations assistant. Be direct, specific, no fluff.\nWork items:\n${ctx}\nToday:${toDS(new Date())}\nGive numbered lists for priorities. Draft full emails when asked. Flag overdue items plainly. Think like a chief of staff.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1024,system:sys,messages:S.msgs.map(m=>({role:m.role,content:m.content}))})});
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    S.msgs=[...S.msgs,{role:'assistant',content:data.content?.map(b=>b.text||'').join('')||'No response.'}];
  }catch(e){S.msgs=[...S.msgs,{role:'assistant',content:`Error: ${e.message}`}];}
  S.loading=false;render();
  setTimeout(()=>{const c=document.getElementById('agent-msgs');if(c)c.scrollTop=c.scrollHeight;},60);
}

  if(!item){S.view='week';render();return;}
  const c=CATS[item.category],p=PRI[item.priority];
  const ts=item.title.replace(/['"<>]/g,'');
  let h=`<div style="max-width:720px;">
    <button class="btn btn-ghost btn-sm" onclick="S.view='week';render()" style="margin-bottom:24px;">← Back</button>
    <div class="card" style="padding:32px 36px;border-left:5px solid ${p.color};">
      <div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;">
        <span style="color:${c.color};font-size:20px;">${c.icon}</span>
        <span class="badge" style="background:${c.bg};color:${c.color};font-size:12px;">${c.label}</span>
        <span class="badge" style="background:${p.bg};color:${p.color};font-size:12px;">${p.label}</span>
      </div>
      <div style="font-size:26px;font-weight:700;color:${T.text};line-height:1.3;margin-bottom:20px;letter-spacing:-0.01em;">${item.title}</div>
      <div style="display:flex;gap:20px;margin-bottom:22px;flex-wrap:wrap;font-size:14px;color:${T.text3};">
        <span>${item.category==='meeting'?'When':'Due'}: <strong style="color:${dueColor(item.due)};">${shortDate(item.due)}${item.time?' at '+item.time:''}</strong></span>
        <span style="color:${dueColor(item.due)};font-weight:600;">${dueLabel(item.due)}</span>
        ${item.waitingOn?`<span style="color:#FBBF24;font-weight:500;">↺ Waiting on ${item.waitingOn}</span>`:''}
      </div>
      ${item.notes?`<div style="background:${T.surface2};border:1.5px solid ${T.border};border-radius:6px;padding:16px 20px;margin-bottom:24px;font-size:14px;color:${T.text2};line-height:1.8;">${item.notes}</div>`:''}
      <div style="margin-bottom:24px;">
        <label class="lbl">Update Status</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          ${Object.entries(STAT).map(([k,v])=>`<button class="btn btn-sm" style="${item.status===k?`background:${v.bg};color:${v.color};border-color:${v.color};`:`background:${T.surface2};color:${T.text3};border:1.5px solid ${T.border};`}" onclick="updateStatus(${item.id},'${k}')">${v.label}</button>`).join('')}
        </div>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;padding-top:22px;border-top:1.5px solid ${T.border};">
        <button class="btn btn-primary" onclick="quickAsk('Help me prepare for or take action on: &quot;${ts}&quot;${item.notes?' Context: '+item.notes.replace(/['"]/g,'').substring(0,100):''}')">⚡ Ask Agent</button>
        ${item.waitingOn?`<button class="btn btn-amber" onclick="quickAsk('Draft a professional follow-up to ${item.waitingOn} regarding: &quot;${ts}&quot;')">Draft Follow-up</button>`:''}
        <button class="btn btn-danger" style="margin-left:auto;" onclick="deleteItem(${item.id})">Delete</button>
      </div>
    </div>
  </div>`;
  document.getElementById('main').innerHTML=h;
}
 
// ── AGENT VIEW ────────────────────────────────────────────
function renderAgent(){
  const hasKey=!!getApiKey();
  let h=`<div style="max-width:820px;">
    <div style="margin-bottom:22px;">
      <div style="font-size:24px;font-weight:700;color:${T.text};letter-spacing:-0.02em;margin-bottom:6px;">⚡ Work Agent</div>
      <div style="font-size:14px;color:${T.text3};">Knows all your work items · Drafts emails · Cuts through the noise</div>
      ${!hasKey?`<div style="margin-top:14px;background:#3a2a05;border:1.5px solid #fbbf2440;border-radius:6px;padding:14px 18px;font-size:14px;color:#FBBF24;display:flex;align-items:center;gap:14px;">API key required to use the agent. <button class="btn btn-xs" style="color:#FBBF24;border:1.5px solid #FBBF24;background:#3a2a05;" onclick="document.getElementById('api-modal').classList.add('open')">Add Key →</button></div>`:''}
    </div>`;
  if(!S.msgs.length){
    h+=`<div style="margin-bottom:22px;">
      <div style="font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:${T.text3};margin-bottom:12px;">Quick Actions</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">`;
    ['Walk me through my week day by day — meetings and deliverables','What are my top 3 priorities right now?',"What's blocked and how do I unblock it?",'I only have 2 hours today. What should I focus on?',"Draft a follow-up for anything I'm waiting on","What's going to blow up if I don't act today?"].forEach(q=>{h+=`<button onclick="quickAsk(${JSON.stringify(q)})" style="text-align:left;background:${T.surface};border:1.5px solid ${T.border};border-radius:6px;cursor:pointer;color:${T.text2};font-family:inherit;font-size:14px;padding:15px 18px;line-height:1.4;">${q}</button>`;});
    h+=`</div></div>`;
  }
  h+=`<div id="agent-msgs" style="display:flex;flex-direction:column;gap:14px;margin-bottom:18px;max-height:520px;overflow-y:auto;">`;
  S.msgs.forEach(m=>{if(m.role==='user')h+=`<div class="bubble-u">${m.content.replace(/</g,'&lt;')}</div>`;else h+=`<div class="bubble-a"><div class="bubble-label">Work Agent</div>${m.content.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>`;});
  if(S.loading)h+=`<div class="bubble-a"><div class="bubble-label">Work Agent</div><span style="color:${T.text3};">Thinking…</span></div>`;
  h+=`</div>
  <div style="display:flex;gap:12px;">
    <input id="agent-inp" class="inp" placeholder="Ask about priorities, request a draft, get unstuck…" style="flex:1;font-size:14px;padding:12px 16px;" ${S.loading?'disabled':''}>
    <button class="btn btn-primary" id="agent-send" ${S.loading?'disabled':''}>Send</button>
    ${S.msgs.length?`<button class="btn btn-ghost" onclick="S.msgs=[];render()">Clear</button>`:''}
  </div></div>`;
  document.getElementById('main').innerHTML=h;
  const inp=document.getElementById('agent-inp');
  document.getElementById('agent-send')?.addEventListener('click',()=>{if(inp?.value?.trim())doSend(inp.value.trim());});
  inp?.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(inp.value.trim())doSend(inp.value.trim());}});
  if(inp&&!S.loading)inp.focus();
}
 
// ── MAIN RENDER ───────────────────────────────────────────
function render(){
  applyTheme();
  renderHeader();
  ({week:renderWeek,board:renderBoard,list:renderList,add:renderAdd,detail:renderDetail,agent:renderAgent}[S.view]||renderWeek)();
}
 
document.addEventListener('click',e=>{
  const nb=e.target.closest('.nav-btn[data-view]');
  if(nb){S.view=nb.dataset.view;render();}
});
document.getElementById('api-modal').addEventListener('click',e=>{if(e.target.id==='api-modal')closeApiModal();});
 
load();render();
</script>
</body>
</html>
